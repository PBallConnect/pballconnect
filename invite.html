<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>You're invited to PBallConnect!</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
</head>
<body style="margin:0;padding:0;background:#0a120b;font-family:Arial,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;box-sizing:border-box;">

<div style="width:100%;max-width:440px;">

  <!-- Loading -->
  <div id="loadingState" style="text-align:center;padding:40px 0;">
    <div style="font-size:40px;margin-bottom:12px;">🎾</div>
    <div style="color:#4CAF7D;font-size:15px;font-weight:600;">Loading your invite…</div>
  </div>

  <!-- Error -->
  <div id="errorState" style="display:none;background:#ffffff;border-radius:20px;padding:32px 28px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.4);">
    <div style="font-size:40px;margin-bottom:12px;">😕</div>
    <p style="color:#111;font-size:17px;font-weight:700;margin:0 0 12px;">This invite link isn't valid.</p>
    <p style="color:#6b7280;font-size:14px;margin:0 0 24px;">It may have expired or already been used.</p>
    <a href="https://pballconnect.com" style="display:inline-block;padding:13px 28px;background:#1a7a3a;color:#fff;font-size:14px;font-weight:700;text-decoration:none;border-radius:10px;">Go to PBallConnect →</a>
  </div>

  <!-- Invite Card -->
  <div id="inviteCard" style="display:none;background:#ffffff;border-radius:20px;padding:32px 28px;box-shadow:0 20px 60px rgba(0,0,0,0.4);">

    <!-- Logo -->
    <div style="text-align:center;margin-bottom:6px;">
      <span style="font-size:28px;font-weight:800;color:#1a7a3a;">PBall</span><span style="font-size:28px;font-weight:800;color:#111;">Connect</span>
      <span style="display:inline-block;margin-left:6px;padding:2px 8px;border-radius:999px;background:#f3f4f6;color:#9ca3af;font-size:9px;font-weight:700;letter-spacing:.08em;vertical-align:middle;">BETA</span>
    </div>
    <p style="text-align:center;color:#9ca3af;font-style:italic;font-size:13px;margin:0 0 24px;">For the Love of Pickleball</p>

    <!-- Headline -->
    <p id="headline" style="color:#111;font-size:20px;font-weight:800;text-align:center;margin:0 0 20px;line-height:1.3;"></p>

    <!-- Personal note -->
    <div id="noteBox" style="display:none;background:#f0fdf4;border:1px solid #d1fae5;border-radius:10px;padding:14px 16px;margin-bottom:20px;">
      <p id="noteText" style="color:#1a5c32;font-style:italic;font-size:14px;line-height:1.6;margin:0;"></p>
    </div>

    <!-- Email input -->
    <label style="display:block;font-size:12px;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;">Your Email</label>
    <input id="emailInput" type="email" autocomplete="email" placeholder="you@example.com"
      style="width:100%;padding:13px 14px;border:2px solid #e5e7eb;border-radius:10px;font-size:15px;color:#111;box-sizing:border-box;outline:none;margin-bottom:6px;"
      oninput="updateBtn()" onfocus="this.style.borderColor='#1a7a3a'" onblur="this.style.borderColor='#e5e7eb'"/>
    <p id="emailError" style="display:none;color:#dc2626;font-size:12px;margin:0 0 12px;"></p>

    <!-- Send button -->
    <button id="sendBtn" onclick="sendMagicLink()"
      style="width:100%;padding:15px;background:#1a7a3a;color:#fff;font-size:15px;font-weight:800;border:none;border-radius:10px;cursor:pointer;margin-top:10px;transition:opacity .15s;"
      disabled>
      Send My Magic Link →
    </button>

    <!-- Success message -->
    <div id="successMsg" style="display:none;text-align:center;padding:16px 0 4px;">
      <div style="font-size:32px;margin-bottom:8px;">✅</div>
      <p style="color:#1a7a3a;font-size:16px;font-weight:700;margin:0 0 4px;">Check your inbox!</p>
      <p style="color:#6b7280;font-size:13px;margin:0;">Click the magic link to continue.</p>
    </div>

    <p style="color:#9ca3af;font-size:12px;text-align:center;margin:18px 0 0;">No password needed — we use secure magic links.</p>

    <hr style="border:none;border-top:1px solid #e5e7eb;margin:20px 0 16px;"/>
    <p style="text-align:center;margin:0;">
      <a href="https://pballconnect.com" style="color:#9ca3af;font-size:13px;text-decoration:none;">Maybe Later</a>
    </p>
  </div>

</div>

<script>
  const SUPABASE_URL = 'https://dltiirdjfbjtydazrmvr.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRsdGlpcmRqZmJqdHlkYXpybXZyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1MDQxNzgsImV4cCI6MjA4OTA4MDE3OH0.oBDtS3RZlGxMkqon-r1wdfYR6jPTSPGWIa8cZh7fLWA';

  const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const params = new URLSearchParams(window.location.search);
  const token = params.get('token');

  function show(id){ document.getElementById(id).style.display='block'; }
  function hide(id){ document.getElementById(id).style.display='none'; }

  function updateBtn(){
    const val = (document.getElementById('emailInput').value||'').trim();
    document.getElementById('sendBtn').disabled = !val.includes('@') || !val.includes('.');
  }

  async function sendMagicLink(){
    const emailVal = (document.getElementById('emailInput').value||'').trim().toLowerCase();
    const errEl = document.getElementById('emailError');
    errEl.style.display = 'none';

    if(!emailVal || !emailVal.includes('@') || !emailVal.includes('.')){
      errEl.textContent = 'Please enter a valid email address.';
      errEl.style.display = 'block';
      return;
    }

    const btn = document.getElementById('sendBtn');
    btn.disabled = true;
    btn.textContent = 'Sending…';

    const redirectTo = 'https://pballconnect.com/?newuser=1&invite=' + encodeURIComponent(token);

    const { error } = await _supabase.auth.signInWithOtp({
      email: emailVal,
      options: { emailRedirectTo: redirectTo }
    });

    if(error){
      btn.disabled = false;
      btn.textContent = 'Send My Magic Link →';
      errEl.textContent = 'Something went wrong. Please try again.';
      errEl.style.display = 'block';
      return;
    }

    btn.style.display = 'none';
    document.getElementById('emailInput').style.display = 'none';
    document.querySelector('label').style.display = 'none';
    show('successMsg');
  }

  // Load invite data
  if(!token){
    hide('loadingState');
    show('errorState');
  } else {
    fetch(`${SUPABASE_URL}/rest/v1/invite_tokens?invite_token=eq.${encodeURIComponent(token)}`, {
      headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': 'Bearer ' + SUPABASE_ANON_KEY }
    })
    .then(r => r.json())
    .then(rows => {
      hide('loadingState');
      if(!rows.length){
        show('errorState');
        return;
      }
      const inv = rows[0];
      const inviterName = inv.inviter_name || 'A fellow player';

      document.getElementById('headline').textContent = '🎾 ' + inviterName + ' has invited you to join PBallConnect!';

      if(inv.personal_note){
        document.getElementById('noteText').textContent = '\u201c' + inv.personal_note + '\u201d';
        show('noteBox');
      }

      const emailInput = document.getElementById('emailInput');
      if(inv.invitee_email){
        emailInput.value = inv.invitee_email;
        updateBtn();
      }

      show('inviteCard');
    })
    .catch(() => {
      hide('loadingState');
      show('errorState');
    });
  }
</script>

</body>
</html>
